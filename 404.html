<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando…</title>
<script>
  // Mantém o usuário na página de vendas para qualquer caminho inválido
  (function(){
    var base = location.pathname.replace(/[^/]*$/, '');
    location.replace(base || '/');
  })();
</script>
<meta http-equiv="refresh" content="0; url=./">
</head>
<body style="font-family:system-ui,sans-serif;background:#0A2540;color:#fff;display:grid;place-items:center;height:100vh;margin:0">
  <p>Redirecionando… <a href="./" style="color:#9EBCF2">clique aqui</a> se não for automático.</p>
</body>
</html>
